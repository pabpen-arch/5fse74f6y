<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Digital Command Center 2025</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
  <div class="logo">Digital Command Center 2025</div>
  <div class="menu">
    <button class="nav-btn active-btn" onclick="showSection('status', this)">
      Status Productos Digitales
    </button>
    <button class="nav-btn" onclick="showSection('proyecciones', this)">
      Proyecciones por producto
    </button>
    <button class="nav-btn" onclick="showSection('plan', this)">
      Plan de trabajo
    </button>
  </div>
</nav>

<section id="statusSection" class="section active">
  <div class="carousel" id="productsContainer"></div>
</section>

<section id="proyeccionesSection" class="section">
  <div class="placeholder">
    <h2>Proyecciones por Producto</h2>
  </div>
</section>

<section id="planSection" class="section">
  <div class="placeholder">
    <h2>Plan de Trabajo</h2>
  </div>
</section>

<div id="modal" class="modal hidden">
  <div class="modal-content">

    <span id="closeBtn">&times;</span>
    <h2 id="modalTitle"></h2>

    <div class="modal-grid">

      <div>
        <canvas id="chart"></canvas>

        <div id="metrics">
          <button onclick="toggleDataset(0)">Valor Total</button>
          <button onclick="toggleDataset(1)">Autogestionado</button>
          <button onclick="toggleDataset(2)">Asesor</button>

          <div class="projection-control">
            <label>
              Simular Adopción Digital:
              <span id="projectionValue">--</span>%
            </label>
            <input type="range" id="projectionSlider" min="0" max="80" value="0">
          </div>
        </div>

      </div>

      <div class="analysis-area" id="analysisPanel"></div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
